<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mini Projects</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#0f172a;
    color:white;
}

/* ========================= */
/* HOME PAGE */
/* ========================= */

#homePage{
    width:100%;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.cards{
    display:grid;
    grid-template-columns:repeat(2,250px);
    gap:20px;
    margin-top:30px;
}

.card{
    background:#1e293b;
    padding:40px;
    border-radius:15px;
    text-align:center;
    cursor:pointer;
    transition:0.3s;
    border:2px solid transparent;
}

.card:hover{
    transform:scale(1.05);
    border:2px solid #38bdf8;
}

/* ========================= */
/* PROJECT PAGES */
/* ========================= */

.page{
    display:none;
    min-height:100vh;
    padding:40px;
}

.backBtn{
    background:#ef4444;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:10px;
    cursor:pointer;
    margin-bottom:20px;
}

/* ========================= */
/* TODO APP */
/* ========================= */

.todo-container{
    width:400px;
    margin:auto;
    background:#1e293b;
    padding:20px;
    border-radius:15px;
}

.todo-container input{
    width:70%;
    padding:10px;
    border:none;
    border-radius:5px;
}

.todo-container button{
    padding:10px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.task{
    background:#334155;
    margin-top:10px;
    padding:10px;
    border-radius:5px;
    display:flex;
    justify-content:space-between;
}

.edit{
    background:#3b82f6;
    color:white;
}

.delete{
    background:#ef4444;
    color:white;
}

/* ========================= */
/* COLOR PALETTE */
/* ========================= */

#palette{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:20px;
    flex-wrap:wrap;
}

.color-box{
    width:100px;
    height:100px;
    border-radius:10px;
    display:flex;
    align-items:end;
    justify-content:center;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

/* ========================= */
/* TABLE */
/* ========================= */

table{
    margin:auto;
    border-collapse:collapse;
    width:70%;
    background:#1e293b;
}

td,th{
    border:1px solid #334155;
    padding:15px;
    text-align:center;
}

/* ========================= */
/* MODAL */
/* ========================= */

.modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:white;
    color:black;
    padding:30px;
    border-radius:10px;
    width:300px;
    text-align:center;
}

.open-btn{
    padding:15px 20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

</style>
</head>

<body>

<!-- ========================= -->
<!-- HOME PAGE -->
<!-- ========================= -->

<div id="homePage">

    <h1>Mini Projects Collection</h1>

    <div class="cards">

        <div class="card" onclick="openPage('todoPage')">
            <h2>To-Do List</h2>
        </div>

        <div class="card" onclick="openPage('colorPage')">
            <h2>Color Palette</h2>
        </div>

        <div class="card" onclick="openPage('tablePage')">
            <h2>Table Generator</h2>
        </div>

        <div class="card" onclick="openPage('modalPage')">
            <h2>Modal Popup</h2>
        </div>

    </div>

</div>

<!-- ========================= -->
<!-- TODO PAGE -->
<!-- ========================= -->

<div class="page" id="todoPage">

    <button class="backBtn" onclick="goHome()">
        Back
    </button>

    <h1 style="text-align:center;margin-bottom:30px;">
        To-Do List
    </h1>

    <div class="todo-container">

        <input type="text" id="taskInput"
        placeholder="Enter task">

        <button onclick="addTask()">
            Add
        </button>

        <div id="taskList"></div>

    </div>

</div>

<!-- ========================= -->
<!-- COLOR PAGE -->
<!-- ========================= -->

<div class="page" id="colorPage">

    <button class="backBtn" onclick="goHome()">
        Back
    </button>

    <h1 style="text-align:center;">
        Color Palette Generator
    </h1>

    <div style="text-align:center;margin-top:20px;">

        <button onclick="generatePalette()">
            Generate Colors
        </button>

    </div>

    <div id="palette"></div>

</div>

<!-- ========================= -->
<!-- TABLE PAGE -->
<!-- ========================= -->

<div class="page" id="tablePage">

    <button class="backBtn" onclick="goHome()">
        Back
    </button>

    <h1 style="text-align:center;margin-bottom:30px;">
        Table Generator
    </h1>

    <table>

        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Role</th>
        </tr>

        <tr>
            <td>1</td>
            <td>Ahmed</td>
            <td>Developer</td>
        </tr>

        <tr>
            <td>2</td>
            <td>Sara</td>
            <td>Designer</td>
        </tr>

        <tr>
            <td>3</td>
            <td>Ali</td>
            <td>Manager</td>
        </tr>

    </table>

</div>

<!-- ========================= -->
<!-- MODAL PAGE -->
<!-- ========================= -->

<div class="page" id="modalPage">

    <button class="backBtn" onclick="goHome()">
        Back
    </button>

    <h1 style="text-align:center;margin-bottom:30px;">
        Modal Popup
    </h1>

    <div style="text-align:center;">

        <button class="open-btn"
        onclick="showModal()">
            Open Modal
        </button>

    </div>

</div>

<!-- ========================= -->
<!-- MODAL -->
<!-- ========================= -->

<div class="modal" id="modal">

    <div class="modal-content">

        <h2>Modal Title</h2>

        <p style="margin:20px 0;">
            This is popup window
        </p>

        <button onclick="hideModal()">
            Close
        </button>

    </div>

</div>

<script>

/* ========================= */
/* NAVIGATION */
/* ========================= */

function openPage(pageId){

    document.getElementById("homePage").style.display = "none";

    const pages = document.querySelectorAll(".page");

    pages.forEach(page => {
        page.style.display = "none";
    });

    document.getElementById(pageId).style.display = "block";
}

function goHome(){

    const pages = document.querySelectorAll(".page");

    pages.forEach(page => {
        page.style.display = "none";
    });

    document.getElementById("homePage").style.display = "flex";
}

/* ========================= */
/* TODO APP */
/* ========================= */

let tasks = [];

function addTask(){

    const input =
    document.getElementById("taskInput");

    if(input.value.trim() === "") return;

    const task = {
        id:Date.now(),
        text:input.value
    };

    tasks.push(task);

    input.value = "";

    renderTasks();
}

function renderTasks(){

    const list =
    document.getElementById("taskList");

    list.innerHTML = "";

    tasks.forEach(task => {

        const div =
        document.createElement("div");

        div.className = "task";

        div.innerHTML = `
            <span>${task.text}</span>

            <div>

                <button class="edit"
                onclick="editTask(${task.id})">
                Edit
                </button>

                <button class="delete"
                onclick="deleteTask(${task.id})">
                Delete
                </button>

            </div>
        `;

        list.appendChild(div);

    });
}

function deleteTask(id){

    tasks =
    tasks.filter(task => task.id !== id);

    renderTasks();
}

function editTask(id){

    const newText = prompt("Edit Task");

    if(!newText) return;

    tasks = tasks.map(task =>
        task.id === id
        ? {...task,text:newText}
        : task
    );

    renderTasks();
}

/* ========================= */
/* COLOR PALETTE */
/* ========================= */

function getRandomColor(){

    const r =
    Math.floor(Math.random()*256);

    const g =
    Math.floor(Math.random()*256);

    const b =
    Math.floor(Math.random()*256);

    return `rgb(${r},${g},${b})`;
}

function generatePalette(){

    const palette =
    document.getElementById("palette");

    palette.innerHTML = "";

    for(let i=0;i<5;i++){

        const color = getRandomColor();

        const box =
        document.createElement("div");

        box.className = "color-box";

        box.style.background = color;

        box.textContent = color;

        box.onclick = () => {

            navigator.clipboard
            .writeText(color);

            alert("Copied!");
        };

        palette.appendChild(box);
    }
}

/* ========================= */
/* MODAL */
/* ========================= */

function showModal(){

    document.getElementById("modal")
    .style.display = "flex";
}

function hideModal(){

    document.getElementById("modal")
    .style.display = "none";
}

</script>

</body>
</html>
